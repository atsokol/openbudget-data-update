on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-data:
    runs-on: ubuntu-latest
    timeout-minutes: 90  # Prevent indefinite hanging
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so pull/rebase works

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.2'

      - name: Install packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::readr
            any::tidyr
            any::dplyr
            any::purrr
            any::httr
            any::lubridate
            any::arrow

      - name: Import data
        run: Rscript -e 'source("src/load_data.R")'
        continue-on-error: false

      - name: Verify imported data
        run: |
          for file in data/parquet/*.parquet; do
            if [ ! -s "$file" ]; then
              echo "Error: $file is empty"
              exit 1
            fi
          done

      - name: Commit results
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

          # 1) Commit whatever the R script changed
          git rm --cached data/*.csv 2>/dev/null || true
          git add data/parquet/*
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Data updated"

            # 2) Make sure we're up to date with remote main
            git fetch origin main
            git pull --rebase origin main

            # 3) Push our rebased commit to main
            git push origin main
          fi

