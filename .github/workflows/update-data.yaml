on:
  workflow_dispatch:

  schedule:
    - cron: '0 10 * * 0'

permissions:
  contents: write

jobs:
  import-data:
    runs-on: ubuntu-latest
    timeout-minutes: 90  # Prevent indefinite hanging
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.2'

      - name: Install packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::readr
            any::tidyr
            any::dplyr
            any::purrr
            any::httr
            any::lubridate
            any::arrow

      - name: Verify data files exist
        run: |
          if [ ! -f "data/parquet/incomes.parquet" ]; then
            echo "Error: data/parquet/incomes.parquet not found"
            exit 1
          fi

      - name: Update data
        run: Rscript -e 'source("src/update_data.R")'
        continue-on-error: false

      - name: Verify updated data
        run: |
          for file in data/parquet/*.parquet; do
            if [ ! -s "$file" ]; then
              echo "Error: $file is empty"
              exit 1
            fi
          done

      - name: Commit results
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add data/parquet/*
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "DATA_CHANGED=false" >> $GITHUB_ENV
          else
            git commit -m 'Data updated'
            git fetch origin
            git rebase origin/main
            git push origin
            echo "DATA_CHANGED=true" >> $GITHUB_ENV
          fi

      - name: Trigger dashboard rebuild
        if: env.DATA_CHANGED == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DASHBOARD_DISPATCH_TOKEN }}
          repository: atsokol/open-budget-dashboard
          event-type: data-updated
