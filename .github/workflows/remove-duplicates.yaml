name: Remove duplicates

on:
  workflow_dispatch:

permissions:
  contents: write   # allow this workflow to push commits

jobs:
  remove-duplicates:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # plenty of time if it runs long

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed so git pull/rebase works

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::readr
            any::dplyr
            any::tidyr
            any::purrr
            any::lubridate
            any::httr
            any::arrow

      - name: Run de-duplication script
        run: Rscript -e 'source("src/remove_duplicates.R")'
        # change the file name above if your script is named differently

      - name: Commit results
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

          # 1) Commit whatever the R script changed
          git add data/parquet/*
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "DATA_CHANGED=false" >> $GITHUB_ENV
          else
            git commit -m "Data updated"

            # 2) Make sure we're up to date with remote main
            git fetch origin main
            git pull --rebase origin main

            # 3) Push our rebased commit to main
            git push origin main
            echo "DATA_CHANGED=true" >> $GITHUB_ENV
          fi

      - name: Trigger dashboard rebuild
        if: env.DATA_CHANGED == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DASHBOARD_DISPATCH_TOKEN }}
          repository: atsokol/open-budget-dashboard
          event-type: data-updated
